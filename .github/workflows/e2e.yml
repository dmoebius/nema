name: E2E Tests (Playwright)

on:
  push:
    branches-ignore: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build app
        run: pnpm build
        env:
          VITE_BASE_PATH: /
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Run e2e tests
        run: pnpm run test:e2e
        env:
          # No E2E_BASE_URL → playwright.config.ts starts vite preview on localhost:5173
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post report URL as job summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name=="playwright-report") | .id')
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.run_id }}"
          echo "## 🎭 Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [📦 Download report ZIP](https://github.com/${REPO}/actions/runs/${RUN_ID}/artifacts/${ARTIFACT_ID})" >> $GITHUB_STEP_SUMMARY
          echo "- [🔍 All artifacts for this run](https://github.com/${REPO}/actions/runs/${RUN_ID}#artifacts)" >> $GITHUB_STEP_SUMMARY
