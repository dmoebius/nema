name: Build, Test & Deploy

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BASE_PATH: /
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: E2E Tests
        uses: ./.github/actions/e2e
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.SUPABASE_ANON_KEY }}
          e2e-test-email: ${{ secrets.E2E_TEST_EMAIL }}
          e2e-test-password: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: Build Android APK
        uses: ./.github/actions/android

      - name: Create GitHub Release with APK
        if: github.ref_name == 'main' || github.ref_name == 'dev'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
            TITLE="Release v${VERSION}"
            PRERELEASE=""
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date -u +%Y-%m-%d)
            TAG="preview-${DATE}-${SHORT_SHA}"
            TITLE="Preview ${DATE} (${SHORT_SHA})"
            PRERELEASE="--prerelease"
          fi
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" nema-debug.apk \
            --title "$TITLE" \
            --notes "Automated build from branch \`${{ github.ref_name }}\` — commit \`$(git rev-parse --short HEAD)\`" \
            $PRERELEASE

      - name: Deploy to Cloudflare Pages
        if: github.ref_name == 'main' || github.ref_name == 'dev'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy dist --project-name=nema-app
            ${{ github.ref_name == 'dev' && '--branch=dev' || '' }}

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **nema Pipeline** — \`${{ github.ref_name }}\` erfolgreich ([Run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))\"}"

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" | head -c 100)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          curl -sf -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ nema Pipeline fehlgeschlagen\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Run\", \"value\": \"[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"\`${COMMIT_SHA}\` ${COMMIT_MSG}\", \"inline\": false},
                  {\"name\": \"Ausgelöst von\", \"value\": \"${{ github.actor }}\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Antworte mit 'fixen' um Alfred zu aktivieren\"}
              }]
            }"
