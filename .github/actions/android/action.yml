name: Build Android APK
description: Sync Capacitor and build debug APK from already-built dist/

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Sync Capacitor
      shell: bash
      run: pnpm build:android

    - name: Build debug APK
      shell: bash
      run: ./gradlew assembleDebug
      working-directory: android

    - name: Copy APK to workspace root
      shell: bash
      run: cp android/app/build/outputs/apk/debug/app-debug.apk nema-debug.apk
